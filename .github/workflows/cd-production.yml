name: CD - Deploy to Production

on:
  workflow_dispatch:
    inputs:
      confirm_deploy:
        description: 'Type "DEPLOY" to confirm production deployment'
        required: true
        type: string
  push:
    tags:
      - 'v*.*.*'

jobs:
  verify-deployment:
    name: Verify Deployment Prerequisites
    runs-on: ubuntu-latest
    
    steps:
      - name: Validate confirmation
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.confirm_deploy != 'DEPLOY'
        run: |
          echo "❌ Deployment not confirmed. Please type 'DEPLOY' to proceed."
          exit 1

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: dom, curl, libxml, mbstring, zip, pcntl, pdo, sqlite, pdo_sqlite, gd

      - name: Install dependencies
        run: composer install --prefer-dist --no-progress --no-dev --optimize-autoloader

      - name: Run quick test suite
        run: |
          cp .env.example .env
          php artisan key:generate
          touch database/database.sqlite
          php artisan migrate --force
          php artisan test --parallel

  deploy-production:
    name: Deploy to Production Server
    runs-on: ubuntu-latest
    needs: verify-deployment
    environment:
      name: production
      url: https://canzim.blaxium.com
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Add server to known hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H ${{ secrets.SERVER_IP }} >> ~/.ssh/known_hosts

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install npm dependencies and build assets
        run: |
          npm ci
          npm run build

      - name: Prepare deployment package
        run: |
          tar -czf deployment.tar.gz \
            --exclude='.git' \
            --exclude='node_modules' \
            --exclude='tests' \
            --exclude='.env' \
            --exclude='storage/*.key' \
            --exclude='vendor' \
            .

      - name: Upload deployment package
        run: |
          scp deployment.tar.gz ${{ secrets.SSH_USER }}@${{ secrets.SERVER_IP }}:/tmp/

      - name: Deploy to production
        run: |
          ssh ${{ secrets.SSH_USER }}@${{ secrets.SERVER_IP }} 'bash -s' < .github/scripts/deploy-production.sh

      - name: Run post-deployment checks
        run: |
          ssh ${{ secrets.SSH_USER }}@${{ secrets.SERVER_IP }} << 'EOF'
            cd /home/blaxium.com/canzim.blaxium.com
            
            # Verify Laravel is responding
            php artisan --version
            
            # Check database connectivity
            php artisan migrate:status
            
            # Clear and optimize caches
            php artisan optimize
            
            # Test application health
            curl -f https://canzim.blaxium.com/api/health || echo "Warning: Health check endpoint not found"
          EOF

      - name: Cleanup
        if: always()
        run: |
          ssh ${{ secrets.SSH_USER }}@${{ secrets.SERVER_IP }} "rm -f /tmp/deployment.tar.gz"

  post-deployment:
    name: Post-Deployment Tasks
    runs-on: ubuntu-latest
    needs: deploy-production
    if: success()
    
    steps:
      - name: Notify deployment success
        run: |
          echo "✅ Production deployment completed successfully!"
          echo "🌐 Application URL: https://canzim.blaxium.com"
          echo "📅 Deployed at: $(date)"

      - name: Create deployment tag
        if: github.event_name != 'push'
        run: |
          echo "Deployment completed. Consider creating a release tag."

  rollback:
    name: Rollback Deployment
    runs-on: ubuntu-latest
    needs: deploy-production
    if: failure()
    
    steps:
      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Add server to known hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H ${{ secrets.SERVER_IP }} >> ~/.ssh/known_hosts

      - name: Execute rollback
        run: |
          ssh ${{ secrets.SSH_USER }}@${{ secrets.SERVER_IP }} << 'EOF'
            cd /home/blaxium.com/canzim.blaxium.com
            
            # Restore from backup
            if [ -d "../canzim.blaxium.com.backup" ]; then
              echo "Rolling back to previous version..."
              rsync -av --delete ../canzim.blaxium.com.backup/ .
              php artisan migrate:rollback --step=1
              php artisan optimize
              echo "✅ Rollback completed"
            else
              echo "❌ No backup found for rollback"
              exit 1
            fi
          EOF

      - name: Notify rollback
        if: always()
        run: |
          echo "⚠️ Deployment failed - rollback executed"
