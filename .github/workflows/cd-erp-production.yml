name: CD - Deploy to ERP Production (erp.canzimbabwe.org.zw)

on:
  workflow_dispatch:
    inputs:
      confirm_deploy:
        description: 'Type "DEPLOY" to confirm deployment to erp.canzimbabwe.org.zw'
        required: true
        type: string
  push:
    tags:
      - "erp-v*.*.*"

jobs:
  verify-deployment:
    name: Verify Deployment Prerequisites
    runs-on: ubuntu-latest

    steps:
      - name: Validate confirmation
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.confirm_deploy != 'DEPLOY'
        run: |
          echo "❌ Deployment not confirmed. Please type 'DEPLOY' to proceed."
          exit 1

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"
          extensions: dom, curl, libxml, mbstring, zip, pcntl, pdo, sqlite, pdo_sqlite, gd

      - name: Install Composer dependencies
        run: composer install --prefer-dist --no-progress --no-dev --optimize-autoloader

      - name: Run quick test suite
        run: |
          cp .env.example .env
          php artisan key:generate
          touch database/database.sqlite
          php artisan migrate --force
          php artisan test --compact

  deploy-erp-production:
    name: Deploy to cPanel Production (erp.canzimbabwe.org.zw)
    runs-on: ubuntu-latest
    needs: verify-deployment
    environment:
      name: erp-production
      url: https://erp.canzimbabwe.org.zw

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.ERP_SSH_PRIVATE_KEY }}

      - name: Add server to known hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H ${{ secrets.ERP_SERVER_IP }} >> ~/.ssh/known_hosts
          ssh-keyscan -p 22 -H ${{ secrets.ERP_SERVER_IP }} >> ~/.ssh/known_hosts

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install npm dependencies and build assets
        run: |
          npm ci
          npm run build

      - name: Prepare deployment package
        run: |
          tar -czf deployment.tar.gz \
            --exclude='.git' \
            --exclude='node_modules' \
            --exclude='tests' \
            --exclude='.env' \
            --exclude='storage/*.key' \
            --exclude='vendor' \
            --exclude='*.sqlite' \
            .

      - name: Upload deployment package to server
        run: |
          scp -P ${{ secrets.ERP_SSH_PORT || '22' }} deployment.tar.gz ${{ secrets.ERP_SSH_USER }}@${{ secrets.ERP_SERVER_IP }}:/tmp/canzim-deployment.tar.gz

      - name: Upload deployment script to server
        run: |
          scp -P ${{ secrets.ERP_SSH_PORT || '22' }} .github/scripts/deploy-cpanel.sh ${{ secrets.ERP_SSH_USER }}@${{ secrets.ERP_SERVER_IP }}:/tmp/deploy-cpanel.sh

      - name: Deploy to cPanel production server
        run: |
          ssh -p ${{ secrets.ERP_SSH_PORT || '22' }} ${{ secrets.ERP_SSH_USER }}@${{ secrets.ERP_SERVER_IP }} 'chmod +x /tmp/deploy-cpanel.sh && /tmp/deploy-cpanel.sh && rm -f /tmp/deploy-cpanel.sh'

      - name: Run post-deployment health check
        run: |
          sleep 15
          HTTP_STATUS=$(curl -o /dev/null -s -w "%{http_code}" https://erp.canzimbabwe.org.zw/ || echo "000")
          echo "Health check HTTP status: $HTTP_STATUS"
          if [ "$HTTP_STATUS" = "200" ] || [ "$HTTP_STATUS" = "302" ]; then
            echo "✅ Application is responding correctly."
          else
            echo "⚠️ Unexpected HTTP status: $HTTP_STATUS - Please verify deployment manually."
          fi

      - name: Cleanup local artifacts
        if: always()
        run: rm -f deployment.tar.gz

  post-deployment:
    name: Post-Deployment Summary
    runs-on: ubuntu-latest
    needs: deploy-erp-production
    if: success()

    steps:
      - name: Deployment success notification
        run: |
          echo "✅ ERP Production deployment completed successfully!"
          echo "🌐 Application URL: https://erp.canzimbabwe.org.zw"
          echo "📅 Deployed at: $(date)"
          echo "🔖 Commit: ${{ github.sha }}"

  rollback:
    name: Rollback ERP Production Deployment
    runs-on: ubuntu-latest
    needs: deploy-erp-production
    if: failure()

    steps:
      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.ERP_SSH_PRIVATE_KEY }}

      - name: Add server to known hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H ${{ secrets.ERP_SERVER_IP }} >> ~/.ssh/known_hosts

      - name: Execute rollback
        run: |
          ssh -p ${{ secrets.ERP_SSH_PORT || '22' }} ${{ secrets.ERP_SSH_USER }}@${{ secrets.ERP_SERVER_IP }} 'bash -s' << 'ENDSSH'
            set -e

            APP_DIR="/home/canzimba/fintrack_app"

            # Detect PHP
            if command -v /opt/cpanel/ea-php82/root/usr/bin/php &>/dev/null; then
              PHP_BIN="/opt/cpanel/ea-php82/root/usr/bin/php"
            else
              PHP_BIN="php"
            fi

            # Find latest backup
            LATEST_BACKUP=$(ls -td /home/canzimba/fintrack_app_backup_* 2>/dev/null | head -1)

            if [ -n "$LATEST_BACKUP" ] && [ -d "$LATEST_BACKUP" ]; then
              echo "⏪ Rolling back to $LATEST_BACKUP..."
              rsync -av --delete "$LATEST_BACKUP/" "$APP_DIR/"
              $PHP_BIN "$APP_DIR/artisan" migrate:rollback --step=1 || true
              $PHP_BIN "$APP_DIR/artisan" optimize
              $PHP_BIN "$APP_DIR/artisan" up
              echo "✅ Rollback completed"
            else
              echo "❌ No backup found for rollback"
              $PHP_BIN "$APP_DIR/artisan" up || true
              exit 1
            fi
          ENDSSH

      - name: Notify rollback
        if: always()
        run: |
          echo "⚠️ Deployment failed — rollback executed"
          echo "🌐 Check: https://erp.canzimbabwe.org.zw"
