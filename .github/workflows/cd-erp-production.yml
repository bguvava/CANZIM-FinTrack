name: CD - Deploy to ERP Production (erp.canzimbabwe.org.zw)

on:
  workflow_dispatch:
    inputs:
      confirm_deploy:
        description: 'Type "DEPLOY" to confirm deployment to erp.canzimbabwe.org.zw'
        required: true
        type: string
  push:
    tags:
      - "erp-v*.*.*"

jobs:
  verify-deployment:
    name: Verify Deployment Prerequisites
    runs-on: ubuntu-latest

    steps:
      - name: Validate confirmation
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.confirm_deploy != 'DEPLOY'
        run: |
          echo "❌ Deployment not confirmed. Please type 'DEPLOY' to proceed."
          exit 1

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"
          extensions: dom, curl, libxml, mbstring, zip, pcntl, pdo, sqlite, pdo_sqlite, gd

      - name: Install Composer dependencies
        run: composer install --prefer-dist --no-progress --optimize-autoloader

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Build frontend assets
        run: |
          npm ci
          npm run build

      - name: Verify application bootstraps
        run: |
          cp .env.example .env
          php artisan key:generate
          php artisan config:clear
          echo "✅ Application bootstrap OK"

  deploy-erp-production:
    name: Deploy to cPanel Production (erp.canzimbabwe.org.zw)
    runs-on: ubuntu-latest
    needs: verify-deployment
    environment:
      name: erp-production
      url: https://erp.canzimbabwe.org.zw

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Build frontend assets
        run: |
          npm ci
          npm run build

      - name: Setup SSH key
        env:
          SSH_PRIVATE_KEY: ${{ secrets.ERP_SSH_PRIVATE_KEY }}
          SSH_PORT: ${{ secrets.ERP_SSH_PORT }}
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          PORT=${SSH_PORT:-22}
          # Scan known hosts so SSH doesn't prompt
          ssh-keyscan -p "$PORT" -H "${{ secrets.ERP_SERVER_IP }}" >> ~/.ssh/known_hosts 2>/dev/null || true
          echo "Host erp-server
            HostName ${{ secrets.ERP_SERVER_IP }}
            User ${{ secrets.ERP_SSH_USER }}
            Port $PORT
            IdentityFile ~/.ssh/deploy_key
            StrictHostKeyChecking no
            ConnectTimeout 30" >> ~/.ssh/config
          chmod 600 ~/.ssh/config
          # Verify key works
          ssh erp-server "echo 'SSH connection OK'"

      - name: Prepare deployment package
        run: |
          tar -czf deployment.tar.gz \
            --exclude='.git' \
            --exclude='node_modules' \
            --exclude='tests' \
            --exclude='.env' \
            --exclude='storage/*.key' \
            --exclude='vendor' \
            --exclude='*.sqlite' \
            --exclude='add-deploy-key.php' \
            --exclude='setup-erp-server.php' \
            .

      - name: Upload and deploy to server
        run: |
          scp deployment.tar.gz erp-server:/tmp/canzim-deployment.tar.gz
          scp .github/scripts/deploy-cpanel.sh erp-server:/tmp/deploy-cpanel.sh
          ssh erp-server 'chmod +x /tmp/deploy-cpanel.sh && /tmp/deploy-cpanel.sh && rm -f /tmp/deploy-cpanel.sh /tmp/canzim-deployment.tar.gz'

      - name: Run post-deployment health check
        run: |
          sleep 10
          HTTP_STATUS=$(curl -o /dev/null -s -w "%{http_code}" --max-time 30 https://erp.canzimbabwe.org.zw/ || echo "000")
          echo "Health check HTTP status: $HTTP_STATUS"
          if [ "$HTTP_STATUS" = "200" ] || [ "$HTTP_STATUS" = "302" ] || [ "$HTTP_STATUS" = "301" ]; then
            echo "Application is responding correctly."
          else
            echo "WARNING: HTTP status $HTTP_STATUS - verify deployment manually at https://erp.canzimbabwe.org.zw"
          fi

      - name: Cleanup
        if: always()
        run: |
          rm -f deployment.tar.gz ~/.ssh/deploy_key

  post-deployment:
    name: Post-Deployment Summary
    runs-on: ubuntu-latest
    needs: deploy-erp-production
    if: success()

    steps:
      - name: Deployment success notification
        run: |
          echo "✅ ERP Production deployment completed successfully!"
          echo "🌐 Application URL: https://erp.canzimbabwe.org.zw"
          echo "📅 Deployed at: $(date)"
          echo "🔖 Commit: ${{ github.sha }}"

  rollback:
    name: Rollback ERP Production Deployment
    runs-on: ubuntu-latest
    needs: deploy-erp-production
    if: failure()

    steps:
      - name: Setup SSH key
        env:
          SSH_PRIVATE_KEY: ${{ secrets.ERP_SSH_PRIVATE_KEY }}
          SSH_PORT: ${{ secrets.ERP_SSH_PORT }}
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          PORT=${SSH_PORT:-22}
          ssh-keyscan -p "$PORT" -H "${{ secrets.ERP_SERVER_IP }}" >> ~/.ssh/known_hosts 2>/dev/null || true
          echo "Host erp-server
            HostName ${{ secrets.ERP_SERVER_IP }}
            User ${{ secrets.ERP_SSH_USER }}
            Port $PORT
            IdentityFile ~/.ssh/deploy_key
            StrictHostKeyChecking no
            ConnectTimeout 30" >> ~/.ssh/config
          chmod 600 ~/.ssh/config

      - name: Execute rollback
        run: |
          ssh erp-server 'bash -s' << 'ENDSSH'
            set -e
            APP_DIR="/home/canzimba/fintrack_app"
            PHP_BIN=$(which php8.3 2>/dev/null || which php8.2 2>/dev/null || which php)
            LATEST_BACKUP=$(ls -td /home/canzimba/fintrack_backups/backup_* 2>/dev/null | head -1)
            if [ -n "$LATEST_BACKUP" ] && [ -d "$LATEST_BACKUP" ]; then
              echo "Rolling back to $LATEST_BACKUP..."
              rsync -a --delete "$LATEST_BACKUP/" "$APP_DIR/"
              $PHP_BIN "$APP_DIR/artisan" optimize
              $PHP_BIN "$APP_DIR/artisan" up
              echo "Rollback completed"
            else
              echo "No backup found for rollback"
              $PHP_BIN "$APP_DIR/artisan" up || true
              exit 1
            fi
          ENDSSH

      - name: Notify rollback
        if: always()
        run: |
          echo "⚠️ Deployment failed — rollback executed"
          echo "🌐 Check: https://erp.canzimbabwe.org.zw"
