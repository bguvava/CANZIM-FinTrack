name: CD - Deploy to ERP Production (erp.canzimbabwe.org.zw)

# Deploys via FTP by uploading a single zip + PHP runner (no SSH needed).
# The PHP runner extracts the zip and runs Laravel migrations/cache.
# Does NOT touch the main website (canzimbabwe.org.zw).

on:
  workflow_dispatch:
    inputs:
      confirm_deploy:
        description: 'Type "DEPLOY" to confirm deployment to erp.canzimbabwe.org.zw'
        required: true
        type: string
  push:
    tags:
      - "erp-v*.*.*"

jobs:
  # ------------------------------------------------------------------
  # JOB 1: Build & package the application
  # ------------------------------------------------------------------
  build:
    name: Build & Package
    runs-on: ubuntu-latest

    steps:
      - name: Validate confirmation
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.confirm_deploy != 'DEPLOY'
        run: |
          echo "Deployment not confirmed. Type DEPLOY to proceed."
          exit 1

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"
          extensions: dom, curl, libxml, mbstring, zip, pcntl, pdo, sqlite, pdo_sqlite, gd

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install Composer dependencies (no dev)
        run: composer install --prefer-dist --no-progress --no-dev --optimize-autoloader

      - name: Build frontend assets
        run: |
          npm ci
          npm run build

      - name: Verify Laravel bootstraps
        run: |
          cp .env.example .env
          php artisan key:generate
          php artisan config:clear
          echo "Bootstrap OK"

      - name: Prepare post-deploy runner
        env:
          ERP_DEPLOY_TOKEN: ${{ secrets.ERP_DEPLOY_TOKEN }}
        run: |
          cp .github/scripts/post-deploy.php.template public/post-deploy.php
          sed -i "s/__DEPLOY_TOKEN__/${ERP_DEPLOY_TOKEN}/g" public/post-deploy.php
          echo "Post-deploy runner prepared"

      - name: Create deployment zip
        run: |
          # Remove the temporary dev .env created during bootstrap verification
          # so it doesn't overwrite the server's production .env
          rm -f .env
          zip -r deploy.zip . \
            -x ".env" \
            -x "*/.env" \
            -x ".env.*" \
            -x "*/.env.*" \
            -x ".git" \
            -x ".git/*" \
            -x "*/.git/*" \
            -x "node_modules/*" \
            -x "*/node_modules/*" \
            -x "tests/*" \
            -x "docs/*" \
            -x "screenshots/*" \
            -x ".github/*" \
            -x "storage/logs/*" \
            -x "storage/framework/cache/*" \
            -x "storage/framework/sessions/*" \
            -x "storage/framework/views/*" \
            -x "setup-erp-server.php" \
            -x "add-deploy-key.php" \
            -x "public/post-deploy.php"
          echo "Zip created: $(du -sh deploy.zip)"

      - name: Prepare FTP staging directory
        run: |
          mkdir -p ftp-staging/public
          mv deploy.zip ftp-staging/deploy.zip
          cp public/post-deploy.php ftp-staging/public/post-deploy.php
          echo "FTP staging contents:"
          find ftp-staging -type f

      - name: Upload staging artifacts
        uses: actions/upload-artifact@v4
        with:
          name: erp-ftp-staging
          path: ftp-staging/
          retention-days: 1

  # ------------------------------------------------------------------
  # JOB 2: Deploy to production via FTP (2 files only)
  # ------------------------------------------------------------------
  deploy:
    name: Deploy to cPanel (erp.canzimbabwe.org.zw)
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 15
    environment:
      name: erp-production
      url: https://erp.canzimbabwe.org.zw

    steps:
      - name: Download staging artifacts
        uses: actions/download-artifact@v4
        with:
          name: erp-ftp-staging
          path: ftp-staging/

      - name: Show files to upload
        run: |
          echo "Files to upload via FTP:"
          find ftp-staging -type f -ls

      - name: Deploy 2 files via FTPS
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.ERP_FTP_HOST }}
          username: ${{ secrets.ERP_FTP_USER }}
          password: ${{ secrets.ERP_FTP_PASS }}
          protocol: ftps
          port: 21
          server-dir: ./fintrack_app/
          local-dir: ./ftp-staging/
          dangerous-clean-slate: false
          log-level: standard

      - name: Run post-deploy tasks (unzip + migrate + cache)
        run: |
          echo "Waiting for FTP to settle..."
          sleep 10
          echo "Calling post-deploy runner..."
          RESPONSE=$(curl -sf --max-time 600 \
            "https://erp.canzimbabwe.org.zw/post-deploy.php?token=${{ secrets.ERP_DEPLOY_TOKEN }}" \
            2>&1) || {
              echo "ERROR: Post-deploy endpoint failed or timed out."
              echo "Response: $RESPONSE"
              exit 1
            }
          echo "Response: $RESPONSE"
          SUCCESS=$(echo "$RESPONSE" | jq -r '.success' 2>/dev/null || echo "unknown")
          if [ "$SUCCESS" = "true" ]; then
            echo "Post-deploy tasks completed successfully."
            echo "$RESPONSE" | jq -r '.log[]' 2>/dev/null || true
          else
            echo "Post-deploy tasks reported failure:"
            echo "$RESPONSE" | jq -r '.log[]' 2>/dev/null || echo "$RESPONSE"
            exit 1
          fi

      - name: Health check
        run: |
          sleep 5
          HTTP_STATUS=$(curl -o /dev/null -s -w "%{http_code}" --max-time 30 \
            https://erp.canzimbabwe.org.zw/ || echo "000")
          echo "Health check: HTTP $HTTP_STATUS"
          if [ "$HTTP_STATUS" = "200" ] || [ "$HTTP_STATUS" = "302" ] || [ "$HTTP_STATUS" = "301" ]; then
            echo "Application is LIVE at https://erp.canzimbabwe.org.zw"
          else
            echo "WARNING: Unexpected HTTP $HTTP_STATUS — verify manually."
          fi

  # ------------------------------------------------------------------
  # JOB 3: Summary
  # ------------------------------------------------------------------
  summary:
    name: Deployment Summary
    runs-on: ubuntu-latest
    needs: deploy
    if: success()

    steps:
      - name: Deployment complete
        run: |
          echo "ERP Production deployment successful!"
          echo "URL:    https://erp.canzimbabwe.org.zw"
          echo "Commit: ${{ github.sha }}"
          echo "Time:   $(date -u)"
